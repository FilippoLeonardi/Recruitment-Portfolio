name: Keep Render app awake

# Pings the live site on a schedule so Render's free tier doesn't spin the
# app down after 15 min of inactivity (which causes a slow ~30-50s cold start
# for the next visitor). Set the SITE_URL repo variable to your Render URL.

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:          # allows manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping site
        run: |
          URL="${{ vars.SITE_URL }}"
          if [ -z "$URL" ]; then
            echo "SITE_URL repo variable is not set — skipping. Add it under Settings > Secrets and variables > Actions > Variables."
            exit 0
          fi
          echo "Pinging $URL"
          curl -sSf --max-time 60 "$URL" -o /dev/null && echo "OK" || echo "Ping failed (app may be waking up)"
